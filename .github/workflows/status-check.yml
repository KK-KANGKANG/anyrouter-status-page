name: anyrouter-status-check

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: anyrouter-status-check
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run probe
        env:
          ANYROUTER_API_BASE: ${{ secrets.ANYROUTER_API_BASE }}
          ANYROUTER_API_KEY: ${{ secrets.ANYROUTER_API_KEY }}
          ANYROUTER_MODEL: ${{ secrets.ANYROUTER_MODEL }}
        run: python scripts/check_anyrouter.py

      - name: Commit data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/status.json docs/data/history.json
          git diff --cached --quiet && exit 0
          git commit -m "chore(status): refresh anyrouter probe data"
          git pull --rebase origin main
          git push origin HEAD:main
